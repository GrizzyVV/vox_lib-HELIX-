<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · context</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700&family=Anton&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../_shared/helix-life.css" />
<style>
  body { display: flex; align-items: center; justify-content: flex-end; padding: 0 48px; }
  .ctx { width: 320px; max-height: 78vh; background: var(--solid); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 22px 64px rgba(0,0,0,.62); overflow: hidden; display: none; flex-direction: column; transform: translateX(14px); opacity: 0; transition: transform .18s ease, opacity .18s ease; }
  .ctx.in { display: flex; transform: none; opacity: 1; }
  .ctx__bar { height: 3px; background: var(--red-grad); }
  .ctx__head { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; }
  .ctx__back { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--line-2); background: var(--panel-2); color: var(--copy); display: none; place-items: center; cursor: pointer; flex: 0 0 auto; }
  .ctx__back.on { display: grid; } .ctx__back:hover { color: var(--text); border-color: var(--red); }
  .ctx__title { font-family: var(--display); font-size: 18px; letter-spacing: .02em; text-transform: uppercase; color: var(--text); flex: 1; }
  .ctx__list { overflow-y: auto; padding: 6px 8px 10px; display: flex; flex-direction: column; gap: 4px; }
  .opt { display: flex; align-items: flex-start; gap: 11px; padding: 11px 12px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: background .12s, border-color .12s; }
  .opt:hover { background: var(--panel-2); border-color: var(--line); }
  .opt.disabled { opacity: .4; cursor: not-allowed; }
  .opt.readonly { cursor: default; }
  .opt__ic { width: 20px; text-align: center; color: var(--red); font-size: 14px; margin-top: 1px; flex: 0 0 auto; }
  .opt__body { flex: 1; min-width: 0; }
  .opt__title { font-size: 13px; font-weight: 600; letter-spacing: .02em; color: var(--text); }
  .opt__desc { font-size: 11.5px; color: var(--copy); margin-top: 2px; line-height: 1.35; }
  .opt__meta { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
  .opt__meta div { font-size: 10.5px; color: var(--dim); font-family: var(--mono); }
  .opt__meta b { color: var(--copy); font-weight: 400; }
  .opt__arrow { color: var(--dim); font-size: 12px; margin-top: 2px; flex: 0 0 auto; }
  .opt__prog { height: 4px; border-radius: 999px; background: rgba(255,255,255,.1); margin-top: 7px; overflow: hidden; }
  .opt__prog i { display: block; height: 100%; background: var(--red); border-radius: 999px; }
</style>
</head>
<body>
<div class="ctx" id="ctx">
  <div class="ctx__bar"></div>
  <div class="ctx__head">
    <div class="ctx__back" id="back"><i class="fa-solid fa-chevron-left"></i></div>
    <div class="ctx__title vx-title" id="title">Menu</div>
  </div>
  <div class="ctx__list" id="list"></div>
</div>
<script>
  (function () {
    "use strict";
    var ctx = document.getElementById("ctx"), list = document.getElementById("list"),
        title = document.getElementById("title"), back = document.getElementById("back");
    var open = false;
    function emit(n, d) { if (typeof hEvent === "function") hEvent(n, d || {}); }
    function txt(s) { var d = document.createElement("div"); d.textContent = String(s == null ? "" : s); return d.innerHTML; }

    function render(d) {
      d = d || {}; title.textContent = d.title || "Menu";
      back.classList.toggle("on", !!d.canBack);
      list.innerHTML = "";
      (d.options || []).forEach(function (o) {
        var row = document.createElement("div");
        row.className = "opt" + (o.disabled ? " disabled" : "") + (o.readOnly ? " readonly" : "");
        var ic = o.icon ? '<div class="opt__ic"' + (o.iconColor ? ' style="color:' + o.iconColor + '"' : "") + '><i class="fa-solid fa-' + o.icon + '"></i></div>' : "";
        var meta = "";
        if (o.metadata) {
          var items = Array.isArray(o.metadata) ? o.metadata : Object.keys(o.metadata).map(function (k) { return { label: k, value: o.metadata[k] }; });
          meta = '<div class="opt__meta">' + items.map(function (m) {
            return '<div><b>' + txt(m.label != null ? m.label : "") + '</b>' + (m.value != null ? ": " + txt(m.value) : "") + '</div>';
          }).join("") + '</div>';
        }
        var prog = (typeof o.progress === "number") ? '<div class="opt__prog"><i style="width:' + o.progress + '%"></i></div>' : "";
        var arrow = o.arrow ? '<div class="opt__arrow"><i class="fa-solid fa-chevron-right"></i></div>' : "";
        row.innerHTML = ic + '<div class="opt__body"><div class="opt__title">' + txt(o.title) + '</div>' +
          (o.description ? '<div class="opt__desc">' + txt(o.description) + '</div>' : "") + meta + prog + '</div>' + arrow;
        if (!o.disabled && !o.readOnly) row.addEventListener("click", function () { emit("context:select", { index: o.index }); });
        list.appendChild(row);
      });
    }
    function show(d) { render(d); ctx.classList.add("in"); open = true; }
    function hide() { open = false; ctx.classList.remove("in"); }

    back.addEventListener("click", function () { emit("context:back", {}); });
    document.addEventListener("keydown", function (e) { if (open && e.key === "Escape") emit("context:close", {}); });
    window.addEventListener("message", function (e) {
      var m = e.data; if (!m || !m.name) return;
      if (m.name === "context:show") show(m.args && m.args[0]);
      else if (m.name === "context:hide") hide();
    });
    setTimeout(function () { emit("Ready", {}); }, 80);
    window.__voxContext = show;
    if (location.hash === "#preview") {
      document.body.style.background = "#0A0A0A";
      show({ title: "Vehicle", canBack: true, options: [
        { index: 1, title: "Engine", description: "Toggle the engine", icon: "power-off" },
        { index: 2, title: "Doors", icon: "car-side", arrow: true },
        { index: 3, title: "Fuel", icon: "gas-pump", metadata: [{ label: "Level", value: "62%" }], progress: 62 },
        { index: 4, title: "Locked", icon: "lock", disabled: true },
      ] });
    }
  })();
</script>
</body>
</html>
