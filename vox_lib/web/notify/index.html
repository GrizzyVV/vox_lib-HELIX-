<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HELIX Notify</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  /* ---- HELIX Brand Kit tokens (from Claude Design HELIX Brand Kit, 2026-06-26) ---- */
  :root {
    --mint: #04FFD1; --mint-soft: #63E6BE; --coral: #FF6B61; --alert: #CE2318;
    --surface: #1E1E24; --line: #28282A; --text: #EDEDED; --copy: #B5B5B6;
    --font-ui: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --chamfer: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: var(--font-body); }

  /* Position anchors */
  .zone { position: fixed; display: flex; flex-direction: column; gap: 10px; padding: 24px; max-width: 360px; }
  .zone[data-pos="top-right"]    { top: 0; right: 0; align-items: flex-end; }
  .zone[data-pos="top-left"]     { top: 0; left: 0; align-items: flex-start; }
  .zone[data-pos="top"]          { top: 0; left: 50%; transform: translateX(-50%); align-items: center; }
  .zone[data-pos="bottom-right"] { bottom: 0; right: 0; align-items: flex-end; flex-direction: column-reverse; }
  .zone[data-pos="bottom-left"]  { bottom: 0; left: 0; align-items: flex-start; flex-direction: column-reverse; }
  .zone[data-pos="bottom"]       { bottom: 0; left: 50%; transform: translateX(-50%); align-items: center; flex-direction: column-reverse; }
  .zone[data-pos="center-right"] { top: 50%; right: 0; transform: translateY(-50%); align-items: flex-end; }
  .zone[data-pos="center-left"]  { top: 50%; left: 0; transform: translateY(-50%); align-items: flex-start; }

  /* Toast — the signature HELIX chamfered card on dark surface */
  .toast {
    position: relative; min-width: 240px; max-width: 360px;
    background: var(--surface); border: 1px solid var(--line);
    border-left: 3px solid var(--accent, var(--mint));
    color: var(--text); padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - var(--chamfer)), calc(100% - var(--chamfer)) 100%, 0 100%);
    box-shadow: 0 6px 24px rgba(0,0,0,.45);
    opacity: 0; transform: translateY(-8px); transition: opacity .22s ease, transform .22s ease;
    overflow: hidden;
  }
  .toast.in  { opacity: 1; transform: translateY(0); }
  .toast.out { opacity: 0; transform: translateY(-8px); }
  .toast[data-align="top"] { align-items: flex-start; }
  .toast[data-align="center"] { align-items: center; }

  .toast__icon {
    flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%;
    display: grid; place-items: center; font-size: 14px;
    background: var(--accent, var(--mint)); color: #000;
  }
  .toast__icon.bare { background: transparent; color: var(--accent, var(--mint)); width: auto; height: auto; }
  .toast__body { flex: 1 1 auto; min-width: 0; }
  .toast__title { font-family: var(--font-ui); font-weight: 600; font-size: 14px; line-height: 1.3; color: var(--text); }
  .toast__desc  { font-size: 13px; line-height: 1.4; color: var(--copy); margin-top: 2px; word-wrap: break-word; }
  .toast__desc strong { color: var(--text); font-weight: 600; }
  .toast__title + .toast__desc { margin-top: 3px; }

  /* duration bar (mint, drains over the duration) */
  .toast__bar { position: absolute; left: 0; bottom: 0; height: 2px; width: 100%; background: var(--accent, var(--mint)); transform-origin: left center; }

  /* type accents */
  .toast.inform  { --accent: var(--mint); }
  .toast.success { --accent: var(--mint-soft); }
  .toast.warning { --accent: var(--coral); }
  .toast.error   { --accent: var(--alert); }
</style>
</head>
<body>
<script>
  (function () {
    "use strict";
    var ICONS = { inform: "circle-info", success: "circle-check", warning: "triangle-exclamation", error: "circle-exclamation" };
    var seenIds = {};

    function zoneFor(pos) {
      pos = pos || "top-right";
      var z = document.querySelector('.zone[data-pos="' + pos + '"]');
      if (!z) { z = document.createElement("div"); z.className = "zone"; z.setAttribute("data-pos", pos); document.body.appendChild(z); }
      return z;
    }

    // minimal, safe markdown: **bold** + line breaks; everything else is escaped text
    function mdEscape(s) {
      var d = document.createElement("div"); d.textContent = String(s); var html = d.innerHTML;
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\n/g, "<br>");
      return html;
    }

    function showToast(d) {
      if (!d || (d.title == null && d.description == null)) return;
      if (d.id != null) { if (seenIds[d.id]) return; seenIds[d.id] = true; }

      var type = d.type || "inform";
      var duration = typeof d.duration === "number" ? d.duration : 3000;
      var showDuration = d.showDuration !== false;

      var toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.setAttribute("data-align", d.alignIcon || "center");
      if (d.style && d.style.backgroundColor) toast.style.background = d.style.backgroundColor;
      if (d.style && d.style.color) toast.style.color = d.style.color;

      // icon
      var iconName = d.icon || ICONS[type];
      if (iconName) {
        var ic = document.createElement("div");
        ic.className = "toast__icon" + (d.iconColor ? " bare" : "");
        if (d.iconColor) ic.style.color = d.iconColor;
        var anim = d.iconAnimation ? (" fa-" + d.iconAnimation.replace(/([A-Z])/g, "-$1").toLowerCase()) : "";
        ic.innerHTML = '<i class="fa-solid fa-' + iconName + anim + '"></i>';
        toast.appendChild(ic);
      }

      var body = document.createElement("div"); body.className = "toast__body";
      if (d.title != null) { var t = document.createElement("div"); t.className = "toast__title"; t.textContent = d.title; body.appendChild(t); }
      if (d.description != null) { var de = document.createElement("div"); de.className = "toast__desc"; de.innerHTML = mdEscape(d.description); body.appendChild(de); }
      toast.appendChild(body);

      if (showDuration && duration > 0) {
        var bar = document.createElement("div"); bar.className = "toast__bar";
        bar.style.transition = "transform " + duration + "ms linear";
        toast.appendChild(bar);
        requestAnimationFrame(function () { bar.style.transform = "scaleX(0)"; });
      }

      zoneFor(d.position).appendChild(toast);
      requestAnimationFrame(function () { toast.classList.add("in"); });

      if (duration > 0) {
        setTimeout(function () {
          toast.classList.remove("in"); toast.classList.add("out");
          setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); if (d.id != null) delete seenIds[d.id]; }, 240);
        }, duration);
      }
    }

    // HELIX WebUI envelope: event.data = { name, args:[payload] }
    window.addEventListener("message", function (e) {
      var msg = e.data;
      if (!msg || msg.name !== "notify") return;
      showToast(msg.args && msg.args[0]);
    });

    // expose for local/browser testing
    window.__voxNotify = showToast;

    // one-click preview (open this file with #preview) — renders every variant on a HELIX-black bg, no extension needed
    if (location.hash === "#preview") {
      document.body.style.background = "#0A0A0A";
      setTimeout(function () {
        showToast({ title: "Success", description: "Player **saved** successfully", type: "success" });
        showToast({ title: "Error", description: "Transaction failed", type: "error", position: "top-left" });
        showToast({ title: "Warning", description: "Low ammo", type: "warning", position: "bottom-right" });
        showToast({ title: "Inform", description: "Press **[E]** to interact", type: "inform", position: "bottom-left" });
        showToast({ title: "Banned", description: "You have been banned", icon: "ban", iconColor: "#CE2318", position: "center-left" });
        showToast({ description: "Description-only toast, no title", type: "inform", position: "top" });
        showToast({ title: "No auto-dismiss", description: "showDuration off", type: "success", showDuration: false, position: "center-right", duration: 8000 });
      }, 300);
    }
  })();
</script>
</body>
</html>
