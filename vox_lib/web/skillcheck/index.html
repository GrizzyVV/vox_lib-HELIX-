<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · skillCheck</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../_shared/helix-life.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; }
  .sc { width: 420px; display: none; flex-direction: column; align-items: center; gap: 16px; opacity: 0; transition: opacity .15s ease; }
  .sc.in { display: flex; opacity: 1; }
  .sc__head { display: flex; align-items: center; gap: 12px; }
  .sc__key { width: 48px; height: 48px; display: grid; place-items: center; background: var(--red-soft); border: 1.5px solid var(--red); border-radius: 10px; font-family: var(--ui); font-weight: 700; font-size: 22px; color: var(--red); text-transform: uppercase; box-shadow: 0 0 24px rgba(240,69,78,.25); }
  .sc__dots { display: flex; gap: 7px; }
  .sc__dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.18); }
  .sc__dot.pass { background: var(--red); } .sc__dot.cur { box-shadow: 0 0 0 3px rgba(240,69,78,.25); background: var(--red); }
  .track { position: relative; width: 100%; height: 16px; background: rgba(8,8,10,.8); border: 1px solid var(--line-2); border-radius: 999px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.55); }
  .zone { position: absolute; top: 0; bottom: 0; background: var(--red-grad); opacity: .5; }
  .ind { position: absolute; top: -4px; bottom: -4px; width: 4px; background: #fff; border-radius: 2px; box-shadow: 0 0 10px rgba(255,255,255,.8); }
  .hint { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--copy); }
  .track.fail .zone { background: #888; } .track.fail .ind { background: #888; box-shadow: none; }
  .track.win .ind { background: var(--red); }
</style>
</head>
<body>
<div class="sc" id="sc">
  <div class="sc__head"><div class="sc__key" id="key">E</div><div class="sc__dots" id="dots"></div></div>
  <div class="track" id="track"><div class="zone" id="zone"></div><div class="ind" id="ind"></div></div>
  <div class="hint" id="hint">Press the key inside the zone</div>
</div>
<script>
  (function () {
    "use strict";
    var sc = document.getElementById("sc"), keyEl = document.getElementById("key"), dots = document.getElementById("dots"),
        track = document.getElementById("track"), zone = document.getElementById("zone"), ind = document.getElementById("ind"), hint = document.getElementById("hint");
    var PRESET = { easy: { size: 18, dur: 2400 }, medium: { size: 12, dur: 1900 }, hard: { size: 7, dur: 1400 } };
    var rounds = [], keys = ["e"], idx = 0, raf = null, t0 = 0, dur = 1900, zStart = 40, zEnd = 60, curKey = "E", running = false, active = false;

    function emit(n, d) { if (typeof hEvent === "function") hEvent(n, d || {}); }
    function cfg(r) { if (typeof r === "string") return PRESET[r] || PRESET.medium; var s = (r && r.areaSize) ? r.areaSize : 12; var sp = (r && r.speedMultiplier) ? r.speedMultiplier : 1; return { size: s, dur: 1900 / sp }; }

    function buildDots() { dots.innerHTML = ""; rounds.forEach(function (_, i) { var d = document.createElement("div"); d.className = "sc__dot" + (i < idx ? " pass" : i === idx ? " cur" : ""); dots.appendChild(d); }); }

    function startRound() {
      var c = cfg(rounds[idx]); dur = c.dur;
      var size = Math.max(4, Math.min(40, c.size));
      zStart = 12 + Math.random() * (88 - size - 12); zEnd = zStart + size;
      zone.style.left = zStart + "%"; zone.style.width = size + "%";
      curKey = (keys[Math.floor(Math.random() * keys.length)] || "e").toUpperCase();
      keyEl.textContent = curKey;
      track.className = "track"; buildDots();
      running = true; t0 = performance.now(); raf = requestAnimationFrame(tick);
    }
    function tick(now) {
      if (!running) return;
      var p = (now - t0) / dur; if (p >= 1) { return fail(); }   // swept past without a hit
      ind.style.left = (p * 100) + "%";
      raf = requestAnimationFrame(tick);
    }
    function pos() { return (parseFloat(ind.style.left) || 0); }
    function pass() {
      running = false; cancelAnimationFrame(raf);
      idx++; if (idx >= rounds.length) { return finish(true); }
      track.className = "track win"; setTimeout(startRound, 150);
    }
    function fail() { running = false; cancelAnimationFrame(raf); track.className = "track fail"; setTimeout(function () { finish(false); }, 260); }
    function finish(success) { active = false; sc.classList.remove("in"); emit("skillcheck:done", { success: success }); }

    document.addEventListener("keydown", function (e) {
      if (!running) return;
      if (e.key.toUpperCase() !== curKey) return fail();   // wrong key
      var x = pos(); if (x >= zStart && x <= zEnd) pass(); else fail();
    });

    function start(d) {
      d = d || {}; rounds = d.rounds && d.rounds.length ? d.rounds : ["medium"]; keys = d.keys && d.keys.length ? d.keys : ["e"];
      idx = 0; active = true; sc.classList.add("in"); startRound();
    }
    window.addEventListener("message", function (e) {
      var m = e.data; if (!m || !m.name) return;
      if (m.name === "skillcheck:show") start(m.args && m.args[0]);
      else if (m.name === "skillcheck:cancel") { if (active) fail(); }
    });
    setTimeout(function () { emit("Ready", {}); }, 80);
    window.__voxSkillCheck = start;
    if (location.hash === "#preview") { document.body.style.background = "#0A0A0A"; start({ rounds: ["easy", "medium", "hard"], keys: ["e"] }); }
  })();
</script>
</body>
</html>
